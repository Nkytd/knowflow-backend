services:
  mysql:
    image: mysql:8.0
    container_name: knowflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: knowflow
      TZ: Asia/Shanghai
    ports:
      - "${KNOWFLOW_MYSQL_HOST_PORT:-3306}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: knowflow-redis
    restart: unless-stopped
    ports:
      - "${KNOWFLOW_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: knowflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "${KNOWFLOW_RABBITMQ_HOST_PORT:-5672}:5672"
      - "${KNOWFLOW_RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    container_name: knowflow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "${KNOWFLOW_MINIO_API_HOST_PORT:-9000}:9000"
      - "${KNOWFLOW_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
