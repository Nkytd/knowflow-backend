<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KnowFlow 工单管理台</title>
    <link rel="stylesheet" href="/console/workbench.css?v=interaction-polish-20260508">
</head>
<body>
<div class="console-shell">
        <header
        class="console-header shell-header"
        data-console-shell
        data-page-key="tickets"
        data-kicker="工单协同"
        data-title="工单管理台"
        data-description="把问答转人工后的处理动作、解决记录和知识回流入口集中到一个操作台里。"
        data-title-help-kicker="工单运营"
        data-title-help-title="让客服处理流真正可见、可推进、可沉淀"
        data-title-help-description="这不是简单的工单列表，而是把“接单、协作、解决、知识回流”连成一条完整业务链路的运营工作台。"
        data-title-help-highlight-title="适合演示的亮点"
        data-title-help-highlight="支持从运营看板深链跳转到具体工单，继续处理并直接生成知识草稿，形成闭环。"
        data-session-hint="请先登录后加载工单数据。"
    ></header>

    <div id="statusBanner" class="status-banner" hidden></div>

    <section id="loginPanel" class="login-panel">
        <div class="login-card">
            <span class="panel-kicker">访问登录</span>
            <h2>登录工单管理台</h2>
            <p>租户管理员或客服坐席登录后，即可查看工单池、处理详情，并从已解决工单直接生成知识草稿。</p>
            <form id="loginForm" class="login-form">
                <label class="field">
                    <span>账号</span>
                    <input id="usernameInput" type="text" placeholder="tenant.admin" autocomplete="username" required>
                </label>
                <label class="field">
                    <span>密码</span>
                    <input id="passwordInput" type="password" placeholder="请输入密码" autocomplete="current-password" required>
                </label>
                <button id="loginButton" class="primary-button" type="submit">登录并进入工单台</button>
            </form>
        </div>
    </section>

    <main id="workspace" class="workspace" hidden>
        <section class="toolbar">
            <div class="filter-grid ticket-filter-grid">
                <label class="field">
                    <span>关键词</span>
                    <input id="keywordFilter" type="text" placeholder="工单标题关键词">
                </label>
                <label class="field">
                    <span>状态</span>
                    <select id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="PENDING">待处理</option>
                        <option value="PROCESSING">处理中</option>
                        <option value="WAITING_USER">待用户反馈</option>
                        <option value="RESOLVED">已解决</option>
                        <option value="CLOSED">已关闭</option>
                    </select>
                </label>
                <label class="field">
                    <span>优先级</span>
                    <select id="priorityFilter">
                        <option value="">全部优先级</option>
                        <option value="LOW">低</option>
                        <option value="MEDIUM">中</option>
                        <option value="HIGH">高</option>
                        <option value="URGENT">紧急</option>
                    </select>
                </label>
                <label class="field">
                    <span>来源</span>
                    <select id="sourceTypeFilter">
                        <option value="">全部来源</option>
                        <option value="QA_HANDOFF">问答转工单</option>
                    </select>
                </label>
                <label class="field">
                    <span>SLA</span>
                    <select id="slaStatusFilter">
                        <option value="">全部 SLA</option>
                        <option value="ON_TRACK">正常</option>
                        <option value="AT_RISK">临近超时</option>
                        <option value="MET">已达成</option>
                        <option value="BREACHED">已超时</option>
                        <option value="PAUSED">已暂停</option>
                    </select>
                </label>
                <label class="field">
                    <span>分派给</span>
                    <select id="assigneeFilter">
                        <option value="">全部人员</option>
                    </select>
                </label>
            </div>
            <div class="toolbar-actions">
                <button id="searchButton" class="primary-button" type="button">查询工单</button>
                <button id="resetButton" class="ghost-button" type="button">重置筛选</button>
            </div>
        </section>

        <section id="contextBanner" class="context-banner" hidden></section>

        <section class="workspace-grid">
            <article class="panel">
                <div class="panel-header">
                    <div>
                        <span class="panel-kicker">工单队列</span>
                        <h3>工单池</h3>
                    </div>
                    <span id="ticketPageMeta" class="panel-caption">加载中</span>
                </div>
                <div id="ticketTable" class="table-wrap"></div>
                <div class="pagination">
                    <div id="ticketPaginationText" class="meta-line">暂无分页信息</div>
                    <div class="pagination-controls">
                        <button id="prevPageButton" class="ghost-button" type="button">上一页</button>
                        <button id="nextPageButton" class="ghost-button" type="button">下一页</button>
                    </div>
                </div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <div>
                        <span class="panel-kicker">工单详情</span>
                        <h3>工单详情与处理动作</h3>
                    </div>
                    <span class="panel-caption">接单、备注、解决、关闭、生成知识草稿都在这里完成</span>
                </div>
                <div id="ticketDetailBody" class="section-stack">
                    <div class="empty-state">
                        <h4>选择一张工单开始处理</h4>
                        <p>左侧点选工单后，这里会展示完整上下文、处理动作和回流入口。</p>
                    </div>
                </div>
            </article>
        </section>
    </main>
</div>

<script src="/console/common.js?v=interaction-polish-20260508"></script>
<script src="/console/tickets.js?v=sla-agent-20260430"></script>
</body>
</html>
