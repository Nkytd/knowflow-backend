spring:
  datasource:
    url: jdbc:h2:mem:knowflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      repositories:
        enabled: false
  h2:
    console:
      enabled: true

management:
  health:
    redis:
      enabled: false
    rabbit:
      enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knowflow:
  profile:
    description: local profile without mandatory infrastructure dependencies
  storage:
    type: ${KNOWFLOW_STORAGE_TYPE:local}
