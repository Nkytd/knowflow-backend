services:
  app:
    build:
      context: .
      args:
        REGISTRY_PREFIX: ${REGISTRY_PREFIX:-}
    image: knowflow-backend:${KNOWFLOW_IMAGE_TAG:-latest}
    container_name: ${KNOWFLOW_APP_CONTAINER_NAME:-knowflow-backend}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      KNOWFLOW_JWT_SECRET: ${KNOWFLOW_JWT_SECRET}
      KNOWFLOW_DB_HOST: ${KNOWFLOW_DB_HOST:-mysql}
      KNOWFLOW_DB_PORT: ${KNOWFLOW_DB_PORT:-3306}
      KNOWFLOW_DB_USERNAME: ${KNOWFLOW_DB_USERNAME:-knowflow}
      KNOWFLOW_DB_PASSWORD: ${KNOWFLOW_DB_PASSWORD}
      KNOWFLOW_REDIS_HOST: ${KNOWFLOW_REDIS_HOST:-redis}
      KNOWFLOW_REDIS_PORT: ${KNOWFLOW_REDIS_PORT:-6379}
      KNOWFLOW_REDIS_DATABASE: ${KNOWFLOW_REDIS_DATABASE:-0}
      KNOWFLOW_RABBITMQ_HOST: ${KNOWFLOW_RABBITMQ_HOST:-rabbitmq}
      KNOWFLOW_RABBITMQ_PORT: ${KNOWFLOW_RABBITMQ_PORT:-5672}
      KNOWFLOW_RABBITMQ_USERNAME: ${KNOWFLOW_RABBITMQ_USERNAME:-knowflow}
      KNOWFLOW_RABBITMQ_PASSWORD: ${KNOWFLOW_RABBITMQ_PASSWORD}
      KNOWFLOW_PARSE_MESSAGING_MODE: ${KNOWFLOW_PARSE_MESSAGING_MODE:-rabbit}
      KNOWFLOW_STORAGE_TYPE: ${KNOWFLOW_STORAGE_TYPE:-minio}
      KNOWFLOW_MINIO_ENDPOINT: ${KNOWFLOW_MINIO_ENDPOINT:-http://minio:9000}
      KNOWFLOW_MINIO_ACCESS_KEY: ${KNOWFLOW_MINIO_ACCESS_KEY:-knowflow}
      KNOWFLOW_MINIO_SECRET_KEY: ${KNOWFLOW_MINIO_SECRET_KEY}
      KNOWFLOW_MINIO_BUCKET: ${KNOWFLOW_MINIO_BUCKET:-knowflow}
      KNOWFLOW_MINIO_AUTO_CREATE_BUCKET: ${KNOWFLOW_MINIO_AUTO_CREATE_BUCKET:-true}
      KNOWFLOW_LLM_OPENAI_ENABLED: ${KNOWFLOW_LLM_OPENAI_ENABLED:-false}
      KNOWFLOW_LLM_OPENAI_BASE_URL: ${KNOWFLOW_LLM_OPENAI_BASE_URL:-}
      KNOWFLOW_LLM_OPENAI_API_KEY: ${KNOWFLOW_LLM_OPENAI_API_KEY:-}
      KNOWFLOW_LLM_OPENAI_CHAT_MODEL: ${KNOWFLOW_LLM_OPENAI_CHAT_MODEL:-LongCat-Flash-Chat}
      KNOWFLOW_LLM_OPENAI_FAST_CHAT_MODEL: ${KNOWFLOW_LLM_OPENAI_FAST_CHAT_MODEL:-LongCat-Flash-Chat}
      KNOWFLOW_LLM_OPENAI_THINKING_CHAT_MODEL: ${KNOWFLOW_LLM_OPENAI_THINKING_CHAT_MODEL:-LongCat-Flash-Thinking-2601}
      KNOWFLOW_LLM_OPENAI_LITE_CHAT_MODEL: ${KNOWFLOW_LLM_OPENAI_LITE_CHAT_MODEL:-LongCat-Flash-Lite}
      KNOWFLOW_LLM_OPENAI_EXPERIMENTAL_CHAT_MODEL: ${KNOWFLOW_LLM_OPENAI_EXPERIMENTAL_CHAT_MODEL:-LongCat-Flash-Chat-2602-Exp}
      KNOWFLOW_LLM_OPENAI_EMBEDDING_MODEL: ${KNOWFLOW_LLM_OPENAI_EMBEDDING_MODEL:-}
      KNOWFLOW_LLM_OPENAI_EMBEDDING_DIMENSIONS: ${KNOWFLOW_LLM_OPENAI_EMBEDDING_DIMENSIONS:-128}
      KNOWFLOW_LLM_OPENAI_CONNECT_TIMEOUT_MS: ${KNOWFLOW_LLM_OPENAI_CONNECT_TIMEOUT_MS:-5000}
      KNOWFLOW_LLM_OPENAI_READ_TIMEOUT_MS: ${KNOWFLOW_LLM_OPENAI_READ_TIMEOUT_MS:-30000}
      KNOWFLOW_QA_TOP_K: ${KNOWFLOW_QA_TOP_K:-5}
      KNOWFLOW_QA_MIN_RECALL_SCORE: ${KNOWFLOW_QA_MIN_RECALL_SCORE:-0.65}
      KNOWFLOW_QA_LEXICAL_WEIGHT: ${KNOWFLOW_QA_LEXICAL_WEIGHT:-0.55}
      KNOWFLOW_QA_VECTOR_WEIGHT: ${KNOWFLOW_QA_VECTOR_WEIGHT:-0.45}
      KNOWFLOW_QA_LOW_CONFIDENCE_HANDOFF_THRESHOLD: ${KNOWFLOW_QA_LOW_CONFIDENCE_HANDOFF_THRESHOLD:-0.50}
    ports:
      - "${KNOWFLOW_APP_HOST_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  mysql:
    image: mysql:8.0
    container_name: ${KNOWFLOW_MYSQL_CONTAINER_NAME:-knowflow-mysql}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${KNOWFLOW_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${KNOWFLOW_DB_NAME:-knowflow}
      MYSQL_USER: ${KNOWFLOW_DB_USERNAME:-knowflow}
      MYSQL_PASSWORD: ${KNOWFLOW_DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${KNOWFLOW_MYSQL_HOST_PORT:-3306}:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ${KNOWFLOW_REDIS_CONTAINER_NAME:-knowflow-redis}
    restart: unless-stopped
    ports:
      - "${KNOWFLOW_REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ${KNOWFLOW_RABBITMQ_CONTAINER_NAME:-knowflow-rabbitmq}
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${KNOWFLOW_RABBITMQ_USERNAME:-knowflow}
      RABBITMQ_DEFAULT_PASS: ${KNOWFLOW_RABBITMQ_PASSWORD}
    ports:
      - "${KNOWFLOW_RABBITMQ_HOST_PORT:-5672}:5672"
      - "${KNOWFLOW_RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: ${KNOWFLOW_MINIO_CONTAINER_NAME:-knowflow-minio}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${KNOWFLOW_MINIO_ACCESS_KEY:-knowflow}
      MINIO_ROOT_PASSWORD: ${KNOWFLOW_MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "${KNOWFLOW_MINIO_API_HOST_PORT:-9000}:9000"
      - "${KNOWFLOW_MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
